media:
  input: images
  output: /images
  path: images
  categories:
    - image
  rename: true
settings:
  hide: true
  content:
    merge: true
components:
  meta_title:
    type: string
    label: Meta Title
    options:
      maxlength: 60
  meta_description:
    type: string
    label: Meta Description
    options:
      maxlength: 160
  block_bunny_video_background:
    label: Bunny Video Background
    type: object
    fields:
      - { name: dark, type: boolean, label: Dark }
      - { name: compact, type: boolean, label: Compact }
      - name: video_url
        type: string
        label: Bunny Stream Embed URL
        required: true
      - { name: thumbnail_url, type: string, label: Thumbnail URL }
      - { name: video_title, type: string, label: Video Title }
      - { name: class, type: string, label: CSS Class }
      - { name: badge, type: string, label: Badge Text }
      - { name: content, type: rich-text, label: Content }
      - name: buttons
        type: object
        label: Buttons
        list: true
        fields:
          - { name: text, type: string, label: Button Text, required: true }
          - { name: href, type: string, label: URL, required: true }
          - { name: variant, type: string, label: Variant }
          - { name: size, type: string, label: Size }
  block_buy_options:
    label: Buy Options
    type: object
    fields:
      - { name: dark, type: boolean, label: Dark }
      - { name: compact, type: boolean, label: Compact }
      - name: items
        type: object
        label: Products
        required: true
        list: true
        fields:
          - { name: image, type: image, label: Image, required: true }
          - { name: name, type: string, label: Name, required: true }
          - { name: subtitle, type: string, label: Subtitle }
          - name: price
            type: string
            label: Price (display, e.g. £15)
          - name: currency
            type: string
            label: Currency (ISO code, e.g. GBP)
          - { name: link, type: string, label: Buy Link, required: true }
          - { name: button_text, type: string, label: Button Text }
      - { name: image_aspect_ratio, type: string, label: Image Aspect Ratio }
      - name: intro_content
        type: rich-text
        label: Intro Content (Markdown)
  block_callout:
    label: Callout
    type: object
    fields:
      - { name: dark, type: boolean, label: Dark }
      - { name: compact, type: boolean, label: Compact }
      - name: variant
        type: string
        label: Variant (info | warning | success | danger)
      - name: icon
        type: string
        label: Icon (Iconify ID, emoji, or path)
      - { name: name, type: string, label: Name }
      - { name: content, type: rich-text, label: Content, required: true }
  block_code_block:
    label: Code Block
    type: object
    fields:
      - { name: dark, type: boolean, label: Dark }
      - { name: compact, type: boolean, label: Compact }
      - { name: filename, type: string, label: Filename, required: true }
      - { name: code, type: string, label: Code, required: true }
      - { name: language, type: string, label: Language }
  block_contact_form:
    label: Contact Form
    type: object
    fields:
      - { name: dark, type: boolean, label: Dark }
      - { name: compact, type: boolean, label: Compact }
      - { name: content, type: rich-text, label: Content }
      - name: intro_content
        type: rich-text
        label: Intro Content (Markdown)
  block_cta:
    label: Cta
    type: object
    fields:
      - { name: dark, type: boolean, label: Dark }
      - { name: compact, type: boolean, label: Compact }
      - { name: content, type: rich-text, label: Content, required: true }
      - name: button
        type: object
        label: Button
        fields:
          - { name: text, type: string, label: Button Text, required: true }
          - { name: href, type: string, label: URL, required: true }
          - { name: variant, type: string, label: Variant }
          - { name: size, type: string, label: Size }
  block_custom_contact_form:
    label: Custom Contact Form
    type: object
    fields:
      - { name: dark, type: boolean, label: Dark }
      - { name: compact, type: boolean, label: Compact }
      - { name: content, type: rich-text, label: Intro Content }
      - name: fields
        type: object
        label: Form Fields
        required: true
        list: true
        fields:
          - { name: name, type: string, label: Field Name, required: true }
          - { name: label, type: string, label: Field Label, required: true }
          - name: type
            type: string
            label: Field Type (text, email, tel, textarea, select, radio, heading)
          - { name: placeholder, type: string, label: Placeholder }
          - { name: required, type: boolean, label: Required }
          - { name: rows, type: number, label: Rows (for textarea) }
          - { name: note, type: string, label: Help Note }
          - { name: fieldClass, type: string, label: CSS Class }
      - name: intro_content
        type: rich-text
        label: Intro Content (Markdown)
  block_downloads:
    label: Downloads
    type: object
    fields:
      - { name: dark, type: boolean, label: Dark }
      - { name: compact, type: boolean, label: Compact }
      - name: intro_content
        type: rich-text
        label: Intro Content (Markdown)
      - name: items
        type: object
        label: Downloads
        required: true
        list: true
        fields:
          - name: file
            type: string
            label: File Path (e.g. /files/guide.pdf)
            required: true
          - { name: label, type: string, label: Label, required: true }
  block_faqs:
    label: Faqs
    type: object
    fields:
      - { name: dark, type: boolean, label: Dark }
      - { name: compact, type: boolean, label: Compact }
      - name: items
        type: object
        label: FAQs
        required: true
        list: true
        fields:
          - { name: question, type: string, label: Question, required: true }
          - { name: answer, type: rich-text, label: Answer (Markdown) }
      - name: intro_content
        type: rich-text
        label: Intro Content (Markdown)
  block_features:
    label: Features
    type: object
    fields:
      - { name: dark, type: boolean, label: Dark }
      - { name: compact, type: boolean, label: Compact }
      - name: items
        type: object
        label: Features
        required: true
        list: true
        fields:
          - name: icon
            type: string
            label: Icon (Iconify ID or HTML entity)
          - { name: name, type: string, label: Name, required: true }
          - { name: description, type: rich-text, label: Description }
          - { name: style, type: string, label: Custom Style }
      - name: intro_content
        type: rich-text
        label: Intro Content (Markdown)
      - { name: center, type: boolean, label: Centered }
  block_gallery:
    label: Gallery
    type: object
    fields:
      - { name: dark, type: boolean, label: Dark }
      - { name: compact, type: boolean, label: Compact }
      - name: items
        type: object
        label: Gallery Images
        required: true
        list: true
        fields:
          - { name: image, type: image, label: Image, required: true }
          - { name: caption, type: string, label: Caption }
      - { name: aspect_ratio, type: string, label: Aspect Ratio }
      - name: intro_content
        type: rich-text
        label: Intro Content (Markdown)
      - { name: masonry, type: boolean, label: Masonry Grid }
  block_guide_categories:
    label: Guide Categories
    type: object
    fields:
      - { name: dark, type: boolean, label: Dark }
      - { name: compact, type: boolean, label: Compact }
  block_hero:
    label: Hero
    type: object
    fields:
      - { name: dark, type: boolean, label: Dark }
      - { name: compact, type: boolean, label: Compact }
      - { name: badge, type: string, label: Badge Text }
      - { name: content, type: rich-text, label: Content, required: true }
      - name: buttons
        type: object
        label: Buttons
        list: true
        fields:
          - { name: text, type: string, label: Button Text, required: true }
          - { name: href, type: string, label: URL, required: true }
          - { name: variant, type: string, label: Variant }
          - { name: size, type: string, label: Size }
      - { name: class, type: string, label: CSS Class }
  block_html:
    label: Html
    type: object
    fields:
      - { name: dark, type: boolean, label: Dark }
      - { name: compact, type: boolean, label: Compact }
      - { name: content, type: string, label: Raw HTML, required: true }
  block_icon_links:
    label: Icon Links
    type: object
    fields:
      - { name: dark, type: boolean, label: Dark }
      - { name: compact, type: boolean, label: Compact }
      - name: intro_content
        type: rich-text
        label: Intro Content (Markdown)
      - name: items
        type: object
        label: Links
        required: true
        list: true
        fields:
          - name: icon
            type: string
            label: Icon (Iconify ID or HTML entity)
            required: true
          - { name: text, type: string, label: Link Text, required: true }
          - { name: url, type: string, label: URL }
  block_iframe_embed:
    label: Iframe Embed
    type: object
    fields:
      - { name: dark, type: boolean, label: Dark }
      - { name: compact, type: boolean, label: Compact }
      - { name: src, type: string, label: Iframe URL, required: true }
      - { name: name, type: string, label: Accessible Name, required: true }
      - { name: width, type: number, label: Width (px) }
      - { name: height, type: number, label: Height (px) }
      - { name: aspect_ratio, type: string, label: Aspect Ratio (e.g. 16/9) }
      - name: max_width
        type: string
        label: Max Width (CSS, e.g. 560px)
      - { name: sandbox, type: string, label: Sandbox }
      - { name: allow, type: string, label: Allow (permissions policy) }
      - { name: scrolling, type: string, label: Scrolling }
      - name: intro_content
        type: rich-text
        label: Intro Content (Markdown)
  block_image_background:
    label: Image Background
    type: object
    fields:
      - { name: dark, type: boolean, label: Dark }
      - { name: compact, type: boolean, label: Compact }
      - { name: image, type: image, label: Background Image, required: true }
      - { name: image_alt, type: string, label: Image Alt Text }
      - { name: class, type: string, label: CSS Class }
      - { name: badge, type: string, label: Badge Text }
      - { name: content, type: rich-text, label: Content }
      - name: buttons
        type: object
        label: Buttons
        list: true
        fields:
          - { name: text, type: string, label: Button Text, required: true }
          - { name: href, type: string, label: URL, required: true }
          - { name: variant, type: string, label: Variant }
          - { name: size, type: string, label: Size }
      - { name: parallax, type: boolean, label: Parallax }
      - { name: tint, type: boolean, label: Tint }
  block_image_cards:
    label: Image Cards
    type: object
    fields:
      - { name: dark, type: boolean, label: Dark }
      - { name: compact, type: boolean, label: Compact }
      - name: items
        type: object
        label: Cards
        required: true
        list: true
        fields:
          - { name: image, type: image, label: Image, required: true }
          - { name: name, type: string, label: Name, required: true }
          - { name: description, type: string, label: Description }
          - { name: link, type: string, label: Link URL }
      - { name: image_aspect_ratio, type: string, label: Image Aspect Ratio }
      - name: intro_content
        type: rich-text
        label: Intro Content (Markdown)
  block_include:
    label: Include
    type: object
    fields:
      - { name: dark, type: boolean, label: Dark }
      - { name: compact, type: boolean, label: Compact }
      - { name: file, type: string, label: Template File Path, required: true }
  block_items:
    label: Items
    type: object
    fields:
      - { name: dark, type: boolean, label: Dark }
      - { name: compact, type: boolean, label: Compact }
      - name: collection
        type: string
        label: Collection Name
        required: true
      - name: intro_content
        type: rich-text
        label: Intro Content (Markdown)
      - { name: horizontal, type: boolean, label: Horizontal Slider }
      - { name: masonry, type: boolean, label: Masonry Grid }
      - name: filter
        type: object
        label: Filter
        fields:
          - name: property
            type: string
            label: Property (e.g. url, data.name)
          - { name: includes, type: string, label: Contains }
          - { name: equals, type: string, label: Equals }
      - { name: image_aspect_ratio, type: string, label: Image Aspect Ratio }
      - name: filter_ui_collection
        type: string
        label: Filter UI Collection
  block_items_array:
    label: Items Array
    type: object
    fields:
      - { name: dark, type: boolean, label: Dark }
      - { name: compact, type: boolean, label: Compact }
      - { name: items, type: string, label: Items, list: true }
      - name: intro_content
        type: rich-text
        label: Intro Content (Markdown)
      - { name: horizontal, type: boolean, label: Horizontal Slider }
      - { name: masonry, type: boolean, label: Masonry Grid }
      - name: filter
        type: object
        label: Filter
        fields:
          - name: property
            type: string
            label: Property (e.g. url, data.name)
          - { name: includes, type: string, label: Contains }
          - { name: equals, type: string, label: Equals }
      - { name: image_aspect_ratio, type: string, label: Image Aspect Ratio }
  block_items_text_list:
    label: Items Text List
    type: object
    fields:
      - { name: dark, type: boolean, label: Dark }
      - { name: compact, type: boolean, label: Compact }
      - name: collection
        type: string
        label: Collection Name
        required: true
      - name: intro_content
        type: rich-text
        label: Intro Content (Markdown)
  block_link_button:
    label: Link Button
    type: object
    fields:
      - { name: dark, type: boolean, label: Dark }
      - { name: compact, type: boolean, label: Compact }
      - { name: text, type: string, label: Button Text, required: true }
      - { name: href, type: string, label: URL, required: true }
      - { name: variant, type: string, label: Variant }
      - { name: size, type: string, label: Size }
      - { name: reveal, type: string, label: Reveal Animation }
  block_link_columns:
    label: Link Columns
    type: object
    fields:
      - { name: dark, type: boolean, label: Dark }
      - { name: compact, type: boolean, label: Compact }
      - name: collection
        type: string
        label: Collection Name
        required: true
      - name: intro_content
        type: rich-text
        label: Intro Content (Markdown)
      - name: filter
        type: object
        label: Filter
        fields:
          - name: property
            type: string
            label: Property (e.g. url, data.name)
          - { name: includes, type: string, label: Contains }
          - { name: equals, type: string, label: Equals }
      - { name: remove_text, type: string, label: Remove Text (Regex) }
  block_markdown:
    label: Markdown
    type: object
    fields:
      - { name: dark, type: boolean, label: Dark }
      - { name: compact, type: boolean, label: Compact }
      - { name: content, type: rich-text, label: Markdown, required: true }
  block_marquee_images:
    label: Marquee Images
    type: object
    fields:
      - { name: dark, type: boolean, label: Dark }
      - { name: compact, type: boolean, label: Compact }
      - name: items
        type: object
        label: Images
        required: true
        list: true
        fields:
          - { name: image, type: string, label: Image Path, required: true }
          - { name: alt, type: string, label: Alt Text }
          - { name: link_url, type: string, label: Link URL }
      - { name: speed, type: string, label: Scroll Speed (e.g. 30s) }
      - { name: height, type: string, label: Image Height (e.g. 50px) }
      - name: intro_content
        type: rich-text
        label: Intro Content (Markdown)
  block_property_contact:
    label: Property Contact
    type: object
    fields:
      - { name: dark, type: boolean, label: Dark }
      - { name: compact, type: boolean, label: Compact }
  block_quote_cart:
    label: Quote Cart
    type: object
    fields:
      - { name: dark, type: boolean, label: Dark }
      - { name: compact, type: boolean, label: Compact }
  block_quote_checkout:
    label: Quote Checkout
    type: object
    fields:
      - { name: dark, type: boolean, label: Dark }
      - { name: compact, type: boolean, label: Compact }
  block_reviews:
    label: Reviews
    type: object
    fields:
      - { name: dark, type: boolean, label: Dark }
      - { name: compact, type: boolean, label: Compact }
      - { name: current_item, type: boolean, label: Filter to Current Item }
      - { name: minimum_rating, type: number, label: Minimum Rating }
      - { name: horizontal, type: boolean, label: Horizontal Slider }
      - { name: masonry, type: boolean, label: Masonry Grid }
  block_section_header:
    label: Section Header
    type: object
    fields:
      - { name: dark, type: boolean, label: Dark }
      - { name: compact, type: boolean, label: Compact }
      - name: intro
        type: rich-text
        label: Section Header Intro
        required: true
  block_snippet:
    label: Snippet
    type: object
    fields:
      - { name: dark, type: boolean, label: Dark }
      - { name: compact, type: boolean, label: Compact }
      - name: reference
        label: Snippet
        type: reference
        options:
          collection: snippets
          search: fields.name
          value: "{path}"
          label: "{fields.name}"
        required: true
  block_socials:
    label: Socials
    type: object
    fields:
      - { name: dark, type: boolean, label: Dark }
      - { name: compact, type: boolean, label: Compact }
      - { name: directory, type: string, label: Directory, required: true }
      - name: intro_content
